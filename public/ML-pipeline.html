<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UWB ML Explorer - Pipeline</title>
<link rel="stylesheet" href="/ml-explorer.css">
</head>
<body>
<div class="shell">
  <div class="main">
    <div class="page-header">
      <div class="page-header-title">Pipeline</div>
    </div>

    <main class="content" style="overflow:hidden; padding:12px 14px;">
      <div style="position:relative; width:100%; height:100%;">
        <svg width="100%" height="100%" viewBox="5 42 616 224" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ML pipeline: raw UWB data through preprocessing, classification, regression, evaluation">
          <title>ML pipeline flow</title>
          <desc>Five stages: raw UWB data to preprocessing to LOS/NLOS classification and distance regression to end-to-end evaluation.</desc>
          <defs>
            <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </marker>
          </defs>

          <rect x="10" y="106" width="100" height="48" rx="8" fill="rgba(123,114,233,0.15)" stroke="#7b72e9" stroke-width="1"></rect>
          <text x="60" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#a09ced">Raw UWB data</text>
          <text x="60" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.45)">Sensor readings</text>

          <line x1="110" y1="130" x2="138" y2="130" stroke="#7b72e9" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="5 3" class="fl"></line>

          <rect x="142" y="76" width="122" height="108" rx="8" fill="rgba(52,196,139,0.12)" stroke="#34c48b" stroke-width="0.8"></rect>
          <text x="203" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#34c48b">Preprocessing</text>
          <rect x="152" y="102" width="102" height="17" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="203" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Cleaning &amp; scaling</text>
          <rect x="152" y="123" width="102" height="17" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="203" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Outlier detection</text>
          <rect x="152" y="144" width="102" height="17" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="203" y="156" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">PCA + feature select</text>
          
          <path d="M264 110 L294 110 L294 82 L322 82" fill="none" stroke="#34c48b" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="5 3" class="fl" style="animation-delay:.3s"></path>
          <path d="M264 152 L294 152 L294 188 L322 188" fill="none" stroke="#34c48b" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="5 3" class="fl" style="animation-delay:.6s"></path>

          <rect x="326" y="50" width="124" height="96" rx="8" fill="rgba(55,138,221,0.12)" stroke="#5aa3e8" stroke-width="0.8"></rect>
          <text x="388" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#5aa3e8">Classification</text>
          <text x="388" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(90,163,232,0.7)">LOS vs NLOS</text>
          <rect x="336" y="88" width="104" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="388" y="99" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Random Forest</text>
          <rect x="336" y="107" width="104" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="388" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">XGBoost / CatBoost</text>
          <rect x="336" y="126" width="104" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="388" y="137" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Stacking ensemble</text>

          <rect x="326" y="164" width="124" height="96" rx="8" fill="rgba(240,167,48,0.12)" stroke="#f0a730" stroke-width="0.8"></rect>
          <text x="388" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f0a730">Regression</text>
          <text x="388" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(240,167,48,0.7)">Distance estimation</text>
          <rect x="336" y="202" width="104" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="388" y="213" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">RF / GB Regressor</text>
          <rect x="336" y="221" width="104" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="388" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Hist. Gradient Boost</text>
          <rect x="336" y="240" width="104" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="388" y="251" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Voting ensemble</text>

          <path d="M450 98 L474 98 L474 138 L502 138" fill="none" stroke="#5aa3e8" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="5 3" class="fl" style="animation-delay:.9s"></path>
          <path d="M450 212 L474 212 L474 170 L502 170" fill="none" stroke="#f0a730" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="5 3" class="fl" style="animation-delay:1.1s"></path>

          <rect x="506" y="100" width="108" height="108" rx="8" fill="rgba(240,106,66,0.12)" stroke="#f06a42" stroke-width="0.8"></rect>
          <text x="560" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f06a42">Evaluation</text>
          <rect x="516" y="124" width="88" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="560" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Classif. metrics</text>
          <rect x="516" y="143" width="88" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="560" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Regression metrics</text>
          <rect x="516" y="162" width="88" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="560" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Cross-validation</text>
          <rect x="516" y="181" width="88" height="15" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"></rect>
          <text x="560" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.8)">Model serialization</text>
        </svg>

        <div class="pipe-legend" style="position:absolute; bottom:0; left:0;">
          <div class="leg"><div class="leg-sq" style="background:#34c48b"></div>Preprocessing</div>
          <div class="leg"><div class="leg-sq" style="background:#5aa3e8"></div>Classification</div>
          <div class="leg"><div class="leg-sq" style="background:#f0a730"></div>Regression</div>
          <div class="leg"><div class="leg-sq" style="background:#f06a42"></div>Evaluation</div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/ml-explorer.js"></script>
<script>
window.MLExplorer.buildComplexityChart();
</script>
</body>
</html>
